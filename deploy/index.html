<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>弹弹塔</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#fef9f0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}

/* ===== 首页 — 羊了个羊风格 ===== */
#home{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;background:#fef9f0;overflow-y:auto;padding:env(safe-area-inset-top) 0 calc(20px + env(safe-area-inset-bottom));text-align:center;display:flex;flex-direction:column}
#home.hidden{display:none}

/* 顶部品牌区 */
.home-brand{padding:24px 20px 6px;flex-shrink:0;position:relative}
.home-logo{font-size:44px;line-height:1.2;display:block;margin-bottom:2px}
.home-title{font-size:28px;font-weight:900;color:#e8734a;letter-spacing:1px;line-height:1.2}
.home-badge{display:inline-block;background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;margin-top:4px;letter-spacing:0.5px}

/* 个人数据条 — 更细腻 */
.stats-row{display:flex;justify-content:center;gap:18px;margin:12px 20px 10px;flex-shrink:0}
.stat-cell{text-align:center}
.stat-cell .v{font-size:20px;font-weight:900;color:#333;line-height:1.2}
.stat-cell .l{font-size:10px;color:#bbb;margin-top:1px}

/* 今日挑战入口 */
.home-daily{background:linear-gradient(135deg,#fef5e7,#fff8ee);border-radius:16px;margin:0 20px 10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;cursor:pointer;border:1px solid #f5ede0;transition:transform .12s cubic-bezier(0.34,1.56,0.64,1)}
.home-daily:active{transform:scale(0.97)}
.home-daily-l{display:flex;align-items:center;gap:10px}
.home-daily-icon{font-size:28px}
.home-daily-info{text-align:left}
.home-daily-info .t{font-size:13px;font-weight:700;color:#e8734a}
.home-daily-info .s{font-size:10px;color:#bbb}
.home-daily-arrow{font-size:16px;color:#ccc}

/* 开始游戏按钮 */
.home-start-wrap{margin:4px 20px 10px;flex-shrink:0}
.btn-start{width:100%;padding:15px 0;border-radius:50px;font-size:19px;font-weight:800;color:#fff;border:none;background:linear-gradient(135deg,#ff6b6b,#ff8e53);box-shadow:0 8px 28px rgba(255,107,107,0.35);cursor:pointer;transition:transform .12s cubic-bezier(0.34,1.56,0.64,1);letter-spacing:2px}
.btn-start:active{transform:scale(0.96)}

/* 关卡功能区 */
.level-section{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:2px 20px 6px}
.level-section-label{font-size:13px;font-weight:800;color:#888;letter-spacing:1px}
.level-section-extra{font-size:10px;color:#ccc;display:flex;gap:12px}
.level-section-extra span{cursor:pointer;transition:color .2s}
.level-section-extra span:active{color:#e8734a}
.level-section-extra .dot{color:#e0d8ce}

/* 关卡格 — 羊了个羊风格方块 */
.grid-wrap{flex:1;overflow-y:auto;padding:0 12px 8px}
#grid{max-width:400px;margin:0 auto;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
#grid div{width:52px;height:56px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;border:1.5px solid #efe8dc;font-size:15px;font-weight:800;color:#555;cursor:pointer;position:relative;transition:transform .1s,box-shadow .1s}
#grid div:active{transform:scale(0.88);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
#grid div.done{background:#f0fdf4;border-color:#86efac;color:#22863a;box-shadow:0 2px 8px rgba(134,239,172,0.2)}
#grid div.locked{opacity:0.2;cursor:default;pointer-events:none;box-shadow:none}
#grid div small{font-size:8px;color:#c0b8aa;line-height:1.2}
#grid div.done small{color:#86efac}
.grid-section-label{width:100%;text-align:left;font-size:10px;font-weight:700;color:#d5cec2;padding:10px 2px 2px;letter-spacing:1px}

/* ===== 游戏HUD ===== */
#hud{position:absolute;top:max(10px,env(safe-area-inset-top));right:0;z-index:5;padding:0 12px;pointer-events:none}
#hud.hidden{display:none}
#hud-right{display:flex;gap:6px}
.hud-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:all;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:transform .1s cubic-bezier(0.34,1.56,0.64,1)}
.hud-btn:active{transform:scale(0.88)}

/* ===== 工具栏 ===== */
#tools{position:absolute;bottom:calc(26px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:12px}
#tools.hidden{display:none}
.tool-btn{width:72px;height:60px;border-radius:18px;background:rgba(255,255,255,0.95);border:2px solid #efe8dc;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.06);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:transform .12s cubic-bezier(0.34,1.56,0.64,1),border-color .15s,opacity .15s}
.tool-btn:active{transform:scale(0.88);border-color:#ff6b6b}
.tool-btn:disabled{opacity:0.22}
.tool-icon{font-size:22px;line-height:1}
.tool-count{font-size:18px;font-weight:900;color:#ff6b6b;line-height:1}
.tool-btn:disabled .tool-count{color:#ccc}

/* ===== 结果面板 — 羊了个羊风格 ===== */
#panel{position:absolute;top:0;left:0;width:100%;height:100%;z-index:15;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px calc(30px + env(safe-area-inset-bottom))}
#panel.hidden{display:none}
.panel-fail,.panel-win{width:100%;max-width:310px;border-radius:28px;padding:28px 22px 20px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.1);animation:panelIn .35s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes panelIn{0%{opacity:0;transform:scale(0.85) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.panel-fail{background:#fff}
.panel-win{background:linear-gradient(180deg,#fff,#fefcf8)}
.pf-emoji{font-size:48px;margin-bottom:4px}
.pf-title{font-size:20px;font-weight:900;color:#555;margin-bottom:8px}
.pf-big{font-size:64px;font-weight:900;color:#ff6b6b;line-height:1;margin-bottom:2px}
.pf-label{font-size:11px;color:#bbb;margin-bottom:2px}
.pf-close{font-size:13px;color:#999;margin-bottom:14px}
.pf-close strong{color:#ff6b6b}
.pf-actions button{width:100%;padding:14px 0;border-radius:50px;font-size:16px;font-weight:800;border:none;cursor:pointer;transition:transform .12s cubic-bezier(0.34,1.56,0.64,1);margin-bottom:8px}
.pf-actions button:last-child{margin-bottom:0}
.pf-actions button:active{transform:scale(0.95)}
.pf-btn-main{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff}
.pf-btn-share{background:#fff;color:#888;border:1.5px solid #e8e0d0!important}
.pf-btn-sub{background:transparent;color:#ccc;font-size:13px;padding:8px!important}

/* 通关面板专属 */
.pw-emoji{font-size:48px;margin-bottom:2px}
.pw-title{font-size:22px;font-weight:900;color:#e67e00;margin-bottom:6px}
.pw-stars{font-size:32px;letter-spacing:4px;margin-bottom:6px}
.pw-detail{font-size:12px;color:#bbb;margin-bottom:10px}
.pw-progress{height:5px;background:#f0e8dc;border-radius:3px;margin:0 0 6px;overflow:hidden}
.pw-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#f97316,#e67e00)}
.pw-labels{display:flex;justify-content:space-between;font-size:9px;color:#ccc;margin-bottom:14px}
.pw-actions button{width:100%;padding:13px 0;border-radius:50px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:transform .12s cubic-bezier(0.34,1.56,0.64,1);margin-bottom:8px}
.pw-actions button:last-child{margin-bottom:0}
.pw-actions button:active{transform:scale(0.95)}
.pw-btn-next{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff}
.pw-btn-share{background:#fff;color:#888;border:1.5px solid #e8e0d0!important;font-size:14px;font-weight:600}
.pw-retry{display:block;text-align:center;font-size:12px;color:#ccc;margin-top:10px;cursor:pointer}
.pw-retry:active{color:#e8734a}

/* 通用面板（暂停/退出/每日/主题/成就） */
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:15;background:rgba(254,249,240,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px calc(20px + env(safe-area-inset-bottom))}
.overlay.hidden{display:none}
.overlay .card{background:#fff;border-radius:28px;padding:26px 22px 20px;text-align:center;box-shadow:0 14px 50px rgba(0,0,0,0.1);width:100%;max-width:310px}
.overlay .card-title{font-size:20px;color:#444;margin-bottom:8px;font-weight:800}
.overlay .card-sub{font-size:12px;color:#aaa;margin:4px 0 10px}
.overlay .btn-main{width:100%;padding:13px 0;border-radius:50px;font-size:15px;font-weight:700;border:none;cursor:pointer;background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;transition:transform .12s cubic-bezier(0.34,1.56,0.64,1);margin-bottom:6px}
.overlay .btn-main:active{transform:scale(0.95)}
.overlay .btn-sec{width:100%;padding:13px 0;border-radius:50px;font-size:14px;font-weight:600;border:1px solid #e8e0d0;cursor:pointer;background:#fafaf7;color:#666;transition:transform .12s cubic-bezier(0.34,1.56,0.64,1)}
.overlay .btn-sec:active{transform:scale(0.95)}
.overlay .btn-ghost{width:100%;padding:10px 0;border-radius:50px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:transparent;color:#bbb;margin-top:4px;transition:opacity .2s}
.overlay .btn-ghost:active{opacity:0.6}

/* 暂停面板特殊 */
.pause-icon{font-size:48px;margin-bottom:8px}

/* 成就通知 toast */
#toast{position:absolute;top:calc(90px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:30;background:rgba(30,30,50,0.92);color:#fff;border-radius:50px;padding:10px 20px;font-size:14px;font-weight:700;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s}
#toast.show{opacity:1}

/* 每日挑战面板 */
.daily-card{background:linear-gradient(135deg,#1a1a3e,#2d1a5e);border-radius:24px;padding:28px 22px 22px;color:#fff;text-align:center;width:100%;max-width:320px}
.daily-badge{font-size:11px;background:rgba(255,215,0,0.2);color:#ffd700;border-radius:20px;padding:3px 12px;display:inline-block;margin-bottom:12px}
.daily-title{font-size:20px;font-weight:900;margin-bottom:4px}
.daily-desc{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:16px}
.daily-target{font-size:48px;font-weight:900;color:#ffd700;line-height:1}
.daily-target-lbl{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:16px}
.btn-daily-start{width:100%;padding:14px 0;border-radius:50px;font-size:16px;font-weight:800;border:none;cursor:pointer;background:linear-gradient(135deg,#ffd700,#ff8e53);color:#fff;margin-bottom:8px;transition:transform .12s cubic-bezier(0.34,1.56,0.64,1)}
.btn-daily-start:active{transform:scale(0.95)}

/* 横屏提示 */
#landscape-warn{position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:#fef9f0;display:none;flex-direction:column;align-items:center;justify-content:center}
#landscape-warn .lw-icon{font-size:64px;margin-bottom:16px}
#landscape-warn .lw-text{font-size:18px;font-weight:900;color:#e8734a}
#landscape-warn .lw-sub{font-size:13px;color:#bbb;margin-top:6px}

/* 平板/大屏适配 */
@media(min-width:560px){
  canvas,#home,#hud,#tools,#panel,#pausePanel,#dailyPanel,#themePanel,#achievePanel,#tutorial,#toast,#landscape-warn{max-width:480px;left:50%!important;transform:translateX(-50%)}
  #tools{transform:translateX(-50%)!important;left:50%!important}
  #hud,#toast{transform:translateX(-50%)!important;left:50%!important}
  body{background:#ede8e0!important}
}

/* 主题选择 */
.theme-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
.theme-item{width:76px;height:68px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:2px solid transparent;font-size:10px;font-weight:700;color:#555;background:#f5f2ee;transition:transform .12s cubic-bezier(0.34,1.56,0.64,1),border-color .2s}
.theme-item:active{transform:scale(0.92)}
.theme-item.active{border-color:#ff6b6b}
.theme-dot{width:28px;height:14px;border-radius:4px}

/* 成就列表 */
.achieve-list{width:100%;max-width:320px;max-height:65vh;overflow-y:auto}
.achieve-item{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.achieve-item.locked{opacity:0.38}
.achieve-icon{font-size:28px;flex-shrink:0}
.achieve-info{flex:1;text-align:left}
.achieve-name{font-size:14px;font-weight:800;color:#333}
.achieve-desc{font-size:11px;color:#aaa;margin-top:2px}
.achieve-check{font-size:18px;flex-shrink:0}

/* 新手提示覆盖 */
#tutorial{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:calc(140px + env(safe-area-inset-bottom))}
#tutorial.hidden{display:none}
.tut-bubble{background:#fff;border-radius:20px;padding:20px 24px;max-width:300px;text-align:center;margin-bottom:16px}
.tut-bubble h3{font-size:18px;font-weight:900;color:#e8734a;margin-bottom:8px}
.tut-bubble p{font-size:13px;color:#666;line-height:1.6}
.tut-arrow{font-size:32px;animation:bounce 1s ease-in-out infinite;margin-bottom:4px}
.tut-skip{color:rgba(255,255,255,0.6);font-size:13px;margin-top:16px;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="toast"></div>

<!-- 横屏提示 -->
<div id="landscape-warn"><div class="lw-icon">📱</div><div class="lw-text">请竖屏使用</div><div class="lw-sub">旋转手机以获得最佳体验</div></div>

<!-- 首页 — 羊了个羊风格 -->
<div id="home">
  <div class="home-brand">
    <span class="home-logo">🪜</span>
    <div class="home-title">弹弹塔</div>
    <span class="home-badge">🎯 堆就完了</span>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-cell"><div class="v" id="statLv">-</div><div class="l">最高关卡</div></div>
    <div class="stat-cell"><div class="v" id="statStars">-</div><div class="l">总星数</div></div>
    <div class="stat-cell"><div class="v" id="statCombo">-</div><div class="l">最高连击</div></div>
    <div class="stat-cell"><div class="v" id="statGames">-</div><div class="l">总局数</div></div>
  </div>

  <div class="home-daily" id="homeDaily">
    <div class="home-daily-l">
      <span class="home-daily-icon">📅</span>
      <div class="home-daily-info">
        <div class="t">今日挑战</div>
        <div class="s" id="dailyPreview">点击查看今日关卡 →</div>
      </div>
    </div>
    <span class="home-daily-arrow">›</span>
  </div>

  <div class="home-start-wrap">
    <button class="btn-start" id="btnStart">▶ 开始游戏</button>
  </div>

  <div class="level-section">
    <span class="level-section-label">📋 选择关卡</span>
    <span class="level-section-extra">
      <span id="btnAchieve">🏅 成就</span>
      <span class="dot">·</span>
      <span id="btnTheme">🎨 主题</span>
    </span>
  </div>

  <div class="grid-wrap">
    <div id="grid"></div>
  </div>
</div>

<!-- 游戏HUD -->
<div id="hud" class="hidden">
  <div id="hud-right">
    <button class="hud-btn" id="btnMute" title="音乐">🔊</button>
    <button class="hud-btn" id="btnPause" title="暂停">⏸</button>
  </div>
</div>

<!-- 工具栏 -->
<div id="tools" class="hidden">
  <button class="tool-btn" id="btnSlow"><span class="tool-icon">🐢</span><span class="tool-count" id="cntSlow">1</span></button>
  <button class="tool-btn" id="btnWiden"><span class="tool-icon">📏</span><span class="tool-count" id="cntWiden">1</span></button>
  <button class="tool-btn" id="btnReverse"><span class="tool-icon">🔄</span><span class="tool-count" id="cntReverse">1</span></button>
</div>

<!-- 结果面板（动态内容由JS生成） -->
<div id="panel" class="hidden"></div>

<!-- 暂停面板 -->
<div id="pausePanel" class="overlay hidden">
  <div class="card">
    <div class="pause-icon">⏸</div>
    <div class="card-title">游戏暂停</div>
    <div class="card-sub" id="pauseInfo"></div>
    <div class="btn-row">
      <button class="btn-main" id="btnResume">▶ 继续</button>
      <button class="btn-sec" id="btnQuit">🏠 退出</button>
    </div>
  </div>
</div>

<!-- 退出确认面板 -->
<div id="quitConfirm" class="overlay hidden">
  <div class="card">
    <div class="pause-icon">😢</div>
    <div class="card-title">确定退出？</div>
    <div class="card-sub" id="quitInfo">当前进度将丢失</div>
    <div class="btn-row">
      <button class="btn-sec" id="btnCancelQuit">↩ 继续玩</button>
      <button class="btn-main" id="btnConfirmQuit">🏠 退出</button>
    </div>
  </div>
</div>

<!-- 每日挑战面板 -->
<div id="dailyPanel" class="overlay hidden">
  <div class="daily-card">
    <div class="daily-badge">📅 今日挑战</div>
    <div class="daily-title" id="dailyName"></div>
    <div class="daily-desc" id="dailyDesc"></div>
    <div class="daily-target" id="dailyTarget"></div>
    <div class="daily-target-lbl">目标层数</div>
    <button class="btn-daily-start" id="btnDailyStart">⚡ 开始挑战</button>
    <button class="btn-ghost" onclick="hide('dailyPanel')">取消</button>
  </div>
</div>

<!-- 主题面板 -->
<div id="themePanel" class="overlay hidden">
  <div class="card">
    <div class="card-title">🎨 选择主题</div>
    <div class="theme-grid" id="themeGrid"></div>
    <button class="btn-ghost" onclick="hide('themePanel')">关闭</button>
  </div>
</div>

<!-- 成就面板 -->
<div id="achievePanel" class="overlay hidden">
  <div class="card-title" style="margin-bottom:12px">🏅 成就</div>
  <div class="achieve-list" id="achieveList"></div>
  <button class="btn-ghost" style="margin-top:10px;color:#aaa" onclick="hide('achievePanel')">关闭</button>
</div>

<!-- 新手引导 -->
<div id="tutorial" class="hidden">
  <div class="tut-bubble">
    <h3>🪜 怎么玩？</h3>
    <p>点击屏幕，下方的方块向上冲刺<br>对准上面的砖块，完美冲刺砖块会变宽<br>堆够目标层数就算通关！</p>
  </div>
  <div class="tut-arrow">👆</div>
  <div class="tut-skip" id="tutSkip">知道了，开始玩 →</div>
</div>

<script src="game-engine.js?v=10"></script>
<script>
(function(){
'use strict';
var C=document.getElementById('c'),X=C.getContext('2d');

function rs(){var d=Math.min(devicePixelRatio||1,2);C.width=innerWidth*d;C.height=innerHeight*d;C.style.width=innerWidth+'px';C.style.height=innerHeight+'px';X.setTransform(1,0,0,1,0,0);X.scale(d,d);if(typeof game!=='undefined')game.resizeViewport(innerWidth,innerHeight);}
addEventListener('resize',rs);rs();

// 音频
var AC=null;
function au(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}
function beep(f,d,t,v){if(!AC)return;var o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.setValueAtTime(f,AC.currentTime);g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);}

// 震动
function vib(type){
  if(!navigator.vibrate)return;
  if(type==='light')navigator.vibrate(20);
  else if(type==='medium')navigator.vibrate(40);
  else if(type==='heavy')navigator.vibrate([30,20,30]);
}

// 存储（QuotaExceeded 时通知用户）
function L(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function S(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));}
  catch(e){
    if(e.name==='QuotaExceededError'||e.code===22)showToast('⚠️ 存储空间不足，进度可能无法保存');
  }
}

// 工具函数
function hide(id){document.getElementById(id).classList.add('hidden');}
function show(id){document.getElementById(id).classList.remove('hidden');}
function el(id){return document.getElementById(id);}
// 读取 CSS safe-area 高度（刘海屏适配 canvas 内 UI）
var safeTop=44;
(function(){
  var d=document.createElement('div');d.style.cssText='position:fixed;top:env(safe-area-inset-top,0);height:0;pointer-events:none';
  document.body.appendChild(d);safeTop=Math.max(44,parseInt(getComputedStyle(d).top)||44);document.body.removeChild(d);
})();

// 全局状态
var TOOLS_PER_ROUND={slow:1,widen:1,reverse:1};
var curLv=1,muteOn=L('mute',false),isPaused=false,dailyChallenge=null;

// 初始化游戏引擎
var game=BounceTower.create({
  ctx:X,width:innerWidth,height:innerHeight,
  useNativeUI:true,
  loadBest:function(){return L('best',0);},
  saveBest:function(v){S('best',v);},
  requestAnimationFrame:function(fn){return requestAnimationFrame(fn);},
  playBeep:beep,
  vibrate:vib,
  safeTop:parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sat'))||safeTop,
  onGameOver:function(sc,cb,ly,nb,m,li,lt){showResultPanel(false,sc,cb,ly,li,lt);},
  onNewBest:function(){},
  onAchievement:function(a){showToast(a.icon+' 成就解锁：'+a.name);},
  onLevelComplete:function(r){
    var stars=L('stars',{});
    var prev=stars[r.levelId]||0;
    if(r.stars>prev){stars[r.levelId]=r.stars;S('stars',stars);}
    S('lvl',Math.min(50,r.levelId+1));
    buildGrid();
    showResultPanel(true,r.score,r.maxCombo,r.layers,r.levelId,r.stars,r.wasNewBest);
  },
  onUseTool:function(){updateTools();},
  loadStats:function(){return L('stats',{totalGames:0,totalLayers:0,bestComboEver:0,totalPerfects:0,unlockedSkins:['default'],dailyStreak:0,lastPlayDate:'',unlockedAchievements:[],levelStars:{},dailyBest:{},tools:{slow:0,widen:0,reverse:0},levelAttempts:{},shareRefills:0});},
  saveStats:function(v){S('stats',v);},
  getTheme:function(){return L('theme','default');}
});

var initStats=game.getStats();
initStats.tools.slow=0;initStats.tools.widen=0;initStats.tools.reverse=0;
game.init();
if(muteOn)game.bgmStop();

// ===== 首页数据 =====
function refreshHomeStats(){
  var st=game.getStats();
  var stars=L('stars',{});
  var totalStars=0;for(var k in stars)totalStars+=stars[k]||0;
  el('statLv').textContent=game.getLevelProgress()||'-';
  el('statStars').textContent=totalStars||'-';
  el('statCombo').textContent=st.bestComboEver||'-';
  el('statGames').textContent=st.totalGames||'-';
}

// ===== 首页每日挑战预览 =====
function refreshDailyPreview(){
  var dc=game.getDailyChallenge();
  if(dc)el('dailyPreview').textContent=dc.name+' · 目标 '+dc.target+' 层';
}

// ===== 关卡格 =====
function buildGrid(){
  var stars=L('stars',null);
  if(!stars||Object.keys(stars).length===0){var st=L('stats',{});stars=st.levelStars||{};}
  var maxUnlocked=1;
  for(var k in stars){if(stars[k]>=1)maxUnlocked=Math.max(maxUnlocked,parseInt(k)+1);}
  maxUnlocked=Math.min(50,maxUnlocked);

  var sections=[
    {label:'⚡ 入门 (1-10)',from:1,to:10},
    {label:'🔥 进阶 (11-20)',from:11,to:20},
    {label:'💥 高手 (21-30)',from:21,to:30},
    {label:'👑 传奇 (31-50)',from:31,to:50},
  ];
  var h='';
  sections.forEach(function(sec){
    h+='<div class="grid-section-label">'+sec.label+'</div>';
    for(var i=sec.from;i<=sec.to;i++){
      var s=stars[i]||0,c='';
      if(s>=1)c='done';if(i>maxUnlocked)c='locked';
      var starStr=s>0?'<small>'+('⭐'.repeat(s))+'</small>':'';
      h+='<div class="'+c+'" data-lv="'+i+'">'+i+'<small>'+BounceTower.LEVELS[i-1].target+'层</small>'+starStr+'</div>';
    }
  });
  el('grid').innerHTML=h;
}
buildGrid();
refreshHomeStats();
refreshDailyPreview();

// ===== Canvas tap =====
C.addEventListener('touchstart',function(e){
  e.preventDefault();au();
  var s=game.getStatus();
  if(s==='idle'||s==='playing')game.handleTap();
},{passive:false});
C.addEventListener('mousedown',function(e){
  e.preventDefault();au();
  var s=game.getStatus();
  if(s==='idle'||s==='playing')game.handleTap();
});

// ===== 首页按钮 =====
el('btnStart').addEventListener('click',function(){au();startGame(-1);});
el('btnStart').addEventListener('touchstart',function(e){e.preventDefault();au();startGame(-1);});
el('grid').addEventListener('click',function(e){
  var lv=e.target.closest('[data-lv]');
  if(lv&&!lv.classList.contains('locked')){au();startGame(parseInt(lv.dataset.lv));}
});
el('homeDaily').addEventListener('click',function(){au();openDailyPanel();});
el('btnAchieve').addEventListener('click',function(){au();openAchievePanel();});
el('btnTheme').addEventListener('click',function(){au();openThemePanel();});

// ===== HUD 按钮 =====
el('btnMute').addEventListener('click',function(){
  au();muteOn=!muteOn;S('mute',muteOn);
  el('btnMute').textContent=muteOn?'🔇':'🔊';
  if(muteOn)game.bgmStop();else game.bgmStart();
});
el('btnPause').addEventListener('click',function(){au();pauseGame();});
el('btnResume').addEventListener('click',function(){au();resumeGame();});
el('btnQuit').addEventListener('click',function(){au();resumeGame();el('quitInfo').textContent='当前已堆 '+game.getScore()+' 层，确定退出？';show('quitConfirm');hide('pausePanel');});
el('btnCancelQuit').addEventListener('click',function(){au();hide('quitConfirm');show('pausePanel');});
el('btnConfirmQuit').addEventListener('click',function(){au();hide('quitConfirm');goHome();});

// ===== 工具栏（带 stopPropagation 防止穿透 canvas）=====
el('btnSlow').addEventListener('touchstart',function(e){e.stopPropagation();});
el('btnSlow').addEventListener('click',function(e){e.stopPropagation();au();game.useTool('slow');updateTools();});
el('btnWiden').addEventListener('touchstart',function(e){e.stopPropagation();});
el('btnWiden').addEventListener('click',function(e){e.stopPropagation();au();game.useTool('widen');updateTools();});
el('btnReverse').addEventListener('touchstart',function(e){e.stopPropagation();});
el('btnReverse').addEventListener('click',function(e){e.stopPropagation();au();game.useTool('reverse');updateTools();});

// ===== 每日挑战 =====
el('btnDailyStart').addEventListener('click',function(){
  au();hide('dailyPanel');
  if(dailyChallenge)startGameDaily(dailyChallenge);
});

// ===== 新手引导 =====
el('tutSkip').addEventListener('click',function(){
  S('tutDone',1);hide('tutorial');
});

// ===== 开始游戏 =====
function startGame(id){
  if(id<0)id=L('lvl',1);
  if(id<1||id>50)id=1;
  curLv=id;
  var lv=BounceTower.LEVELS[id-1];
  var st=game.getStats();
  st.tools.slow=TOOLS_PER_ROUND.slow;
  st.tools.widen=TOOLS_PER_ROUND.widen;
  st.tools.reverse=TOOLS_PER_ROUND.reverse;
  game.setMode('level',{levelId:lv.id,target:lv.target,speedMul:lv.speedMul});
  hide('home');hide('panel');hide('pausePanel');hide('quitConfirm');
  show('hud');show('tools');
  el('btnMute').textContent=muteOn?'🔇':'🔊';
  updateTools();
  if(!muteOn)game.bgmStart();
  // 第1关新手引导
  if(id===1&&!L('tutDone',0)){show('tutorial');}
}

function startGameDaily(dc){
  curLv=dc.levelId;
  var st=game.getStats();
  st.tools.slow=TOOLS_PER_ROUND.slow;
  st.tools.widen=TOOLS_PER_ROUND.widen;
  st.tools.reverse=TOOLS_PER_ROUND.reverse;
  game.setMode('daily',{levelId:dc.levelId,target:dc.target,speedMul:dc.speedMul});
  hide('home');hide('panel');hide('pausePanel');hide('quitConfirm');
  show('hud');show('tools');
  el('btnMute').textContent=muteOn?'🔇':'🔊';
  updateTools();
  if(!muteOn)game.bgmStart();
}

// ===== 暂停/恢复 =====
function pauseGame(){
  var s=game.getStatus();
  if(s!=='playing'&&s!=='idle')return;
  game.pauseEngine();
  el('pauseInfo').textContent='第'+curLv+'关 · 已堆 '+game.getScore()+' 层';
  show('pausePanel');
  hide('hud');hide('tools');
}
function resumeGame(){
  hide('pausePanel');
  var s=game.getStatus();
  if(s==='playing'||s==='idle'){
    show('hud');show('tools');
    game.resumeEngine();
    if(muteOn)game.bgmStop();
  }
}

// ===== 返回首页 =====
function goHome(){
  hide('panel');hide('hud');hide('tools');hide('pausePanel');hide('tutorial');hide('quitConfirm');
  show('home');
  game.bgmStop();
  game.reset();
  refreshHomeStats();
  refreshDailyPreview();
}

// ===== 羊了个羊风格结果面板 =====
function showResultPanel(win,score,cb,ly,levelId,starsOrTarget,wasNewBest){
  var stars=win?starsOrTarget:0;
  hide('hud');hide('tools');
  var p=el('panel');p.className='';p.innerHTML='';

  if(!win){
    // ===== 失败面板 =====
    var remain=(BounceTower.LEVELS[(levelId||curLv)-1]||{}).target-score;
    p.innerHTML='<div class="panel-fail">'+
      '<div class="pf-emoji">😢</div>'+
      '<div class="pf-title">差一点就过了</div>'+
      '<div class="pf-big">'+score+'</div>'+
      '<div class="pf-label">层</div>'+
      '<div class="pf-close">'+(remain>0&&remain<=15?'只差 <strong>'+remain+'</strong> 层！':(remain>0?'还差 '+remain+' 层':'继续加油'))+'</div>'+
      '<div class="pf-actions">'+
        '<button class="pf-btn-main" id="pRetry">🔄 再试一次</button>'+
        '<button class="pf-btn-share" id="pShareFail">📤 分享得道具</button>'+
        '<button class="pf-btn-sub" id="pHomeFail">🏠 返回首页</button>'+
      '</div></div>';
    el('pRetry').addEventListener('click',function(){au();startGame(levelId||curLv);});
    el('pShareFail').addEventListener('click',function(){au();shareScore(score,cb,levelId);});
    el('pHomeFail').addEventListener('click',goHome);
    show('panel');
  }else{
    // ===== 通关面板 =====
    var nextLv=levelId+1;
    var pct=levelId<=3?95:levelId<=6?60:levelId<=10?35:levelId<=15?18:levelId<=20?8:levelId<=25?3:levelId<=30?1:levelId<=40?0.3:0.05;
    var progWidth=Math.min(100,(score/((BounceTower.LEVELS[levelId-1]||{}).target||1))*100);
    p.innerHTML='<div class="panel-win">'+
      '<div class="pw-emoji">🎉</div>'+
      '<div class="pw-title">'+'通关！'+(wasNewBest?' 新纪录！':'')+'</div>'+
      '<div class="pw-stars">'+'⭐'.repeat(stars)+'☆'.repeat(Math.max(0,3-stars))+'</div>'+
      '<div class="pw-detail">'+score+' 层 · 最高 '+cb+' 连击</div>'+
      '<div class="pw-progress"><div class="pw-progress-fill" style="width:'+progWidth+'%"></div></div>'+
      '<div class="pw-labels"><span>🏅 超过 '+pct+'% 玩家</span><span>'+(stars>=3?'🌟 完美':'⭐ 目标 '+((BounceTower.LEVELS[levelId-1]||{}).target)+' 层')+'</span></div>'+
      '<div class="pw-actions">'+
        ((levelId||curLv)>=50?'':'<button class="pw-btn-next" id="pNext">▶ 下一关</button>')+
        '<button class="pw-btn-share" id="pShareWin">📤 分享炫耀</button>'+
      '</div>'+
      ((levelId||curLv)>=50?'':'<div class="pw-retry" id="pRetryWin">🔁 重玩本关</div>')+
      '<div class="pw-retry" id="pHomeWin">🏠 返回首页</div></div>';
    if((levelId||curLv)<50){
      el('pNext').addEventListener('click',function(){au();startGame(nextLv);});
      el('pRetryWin').addEventListener('click',function(){au();startGame(levelId||curLv);});
    }
    el('pShareWin').addEventListener('click',function(){au();shareScore(score,cb,levelId);});
    el('pHomeWin').addEventListener('click',goHome);
    show('panel');
  }
}

// ===== 工具计数更新 =====
function updateTools(){
  var sc=game.getToolCount('slow'),wc=game.getToolCount('widen'),rc=game.getToolCount('reverse');
  el('btnSlow').disabled=sc<=0;el('cntSlow').textContent=sc;
  el('btnWiden').disabled=wc<=0;el('cntWiden').textContent=wc;
  el('btnReverse').disabled=rc<=0;el('cntReverse').textContent=rc;
  // 工具用完时闪烁提示
  if(sc<=0&&wc<=0&&rc<=0)showToast('💡 道具用完了，分享给好友获取道具！');
}

// ===== 成就 Toast =====
var toastTimer=null;
function showToast(msg){
  var t=el('toast');t.textContent=msg;t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove('show');},3000);
}

// ===== 每日挑战 =====
function openDailyPanel(){
  dailyChallenge=game.getDailyChallenge();
  el('dailyName').textContent=dailyChallenge.name;
  el('dailyDesc').textContent=dailyChallenge.desc||'今日特别挑战';
  el('dailyTarget').textContent=dailyChallenge.target;
  show('dailyPanel');
}

// ===== 主题选择 =====
function openThemePanel(){
  var themes=BounceTower.THEMES;
  var cur=L('theme','default');
  var g=el('themeGrid');g.innerHTML='';
  Object.keys(themes).forEach(function(key){
    var th=themes[key];
    var item=document.createElement('div');
    item.className='theme-item'+(key===cur?' active':'');
    var dot=document.createElement('div');
    dot.className='theme-dot';
    dot.style.background='linear-gradient(90deg,'+th.pals[0][0]+','+th.pals[0][1]+')';
    var lbl=document.createElement('div');
    lbl.textContent=th.name;
    item.appendChild(dot);item.appendChild(lbl);
    item.addEventListener('click',function(){
      S('theme',key);game.refreshTheme();
      g.querySelectorAll('.theme-item').forEach(function(i){i.classList.remove('active');});
      item.classList.add('active');
    });
    g.appendChild(item);
  });
  show('themePanel');
}

// ===== 分享 =====
function shareScore(score,cb,levelId){
  var text='🪜 我在弹弹塔堆了 '+score+' 层'+(levelId?'（第'+levelId+'关）':'')+'，最高 '+cb+' 连击！来挑战我吧 →';
  if(navigator.share){
    navigator.share({title:'弹弹塔',text:text,url:location.href}).catch(function(){});
  }else{
    var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');showToast('✅ 成绩已复制，去分享给好友吧！');}catch(e){}
    document.body.removeChild(ta);
  }
}

// ===== 横屏检测 =====
function checkOrientation(){
  el('landscape-warn').style.display=(window.innerHeight<window.innerWidth&&window.innerWidth<560)?'flex':'none';
}
addEventListener('resize',checkOrientation);
checkOrientation();

// ===== 成就列表 =====
function openAchievePanel(){
  var unlocked=game.getStats().unlockedAchievements;
  var list=el('achieveList');list.innerHTML='';
  BounceTower.ACHIEVEMENTS.forEach(function(a){
    var done=unlocked.indexOf(a.id)!==-1;
    var item=document.createElement('div');
    item.className='achieve-item'+(done?'':' locked');
    item.innerHTML='<div class="achieve-icon">'+a.icon+'</div>'+
      '<div class="achieve-info"><div class="achieve-name">'+a.name+'</div><div class="achieve-desc">'+a.desc+'</div></div>'+
      '<div class="achieve-check">'+(done?'✅':'🔒')+'</div>';
    list.appendChild(item);
  });
  show('achievePanel');
}


})();
</script>
